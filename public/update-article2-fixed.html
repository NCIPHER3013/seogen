<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Update Tabletop Sealer Article (FIXED)</title>
  <style>body { font-family: sans-serif; padding: 2rem; }</style>
</head>
<body>
  <h1>กำลังอัปเดตรูปภาพสำหรับบทความ: เครื่องซีลตั้งโต๊ะ ขนาดเล็ก (แบบเจาะจงแทนที่ลิงก์เก่า)...</h1>
  <div id="status" style="white-space: pre-wrap; font-family: monospace; line-height: 1.5;">กำลังอัปเดต...<br></div>
  <script>
    const log = (msg) => {
      document.getElementById('status').innerHTML += msg + '<br>';
    };

    const newUrls = [
      "https://jkfyyidrrjenvwdxljze.supabase.co/storage/v1/object/public/articles/seo-campaign/tabletop_vacuum_cover_unbranded_1779995175619.png",
      "https://jkfyyidrrjenvwdxljze.supabase.co/storage/v1/object/public/articles/seo-campaign/tabletop_band_inline_unbranded_1779995194318.png",
      "https://jkfyyidrrjenvwdxljze.supabase.co/storage/v1/object/public/articles/seo-campaign/tabletop_control_inline_unbranded_1779995209812.png"
    ];
    
    // Using string split & join is safer than Regex for URLs
    function replaceAllSafe(str, find, replace) {
      return str.split(find).join(replace);
    }
    
    try {
      const saved = localStorage.getItem('campaign_config_generatedArticles');
      if (saved) {
        let articles = JSON.parse(saved);
        
        let targetArticle = articles.find(a => a.keyword === 'เครื่องซีลตั้งโต๊ะเล็ก' || a.title.includes('เครื่องซีลตั้งโต๊ะ'));
        if (targetArticle) {
          let updatedContent = targetArticle.content;
          
          if (targetArticle.images && targetArticle.images.length >= 3) {
             const oldUrl1 = targetArticle.images[0].url;
             const oldUrl2 = targetArticle.images[1].url;
             const oldUrl3 = targetArticle.images[2].url;
             
             log('พบ URL รูปหน้าปกเก่า: ' + oldUrl1);
             log('พบ URL รูปประกอบ 1 เก่า: ' + oldUrl2);
             log('พบ URL รูปประกอบ 2 เก่า: ' + oldUrl3);
             
             updatedContent = replaceAllSafe(updatedContent, oldUrl1, newUrls[0]);
             updatedContent = replaceAllSafe(updatedContent, oldUrl2, newUrls[1]);
             updatedContent = replaceAllSafe(updatedContent, oldUrl3, newUrls[2]);
             
             targetArticle.images[0].url = newUrls[0];
             targetArticle.images[1].url = newUrls[1];
             targetArticle.images[2].url = newUrls[2];
             
          } else {
             log('⚠️ โครงสร้างรูปไม่ปกติ พยายามค้นหาลิงก์แบบ manual...');
             // Manual fallback replacing known old supabase urls for article 2
             const knownOlds = [
               "https://jkfyyidrrjenvwdxljze.supabase.co/storage/v1/object/public/articles/seo-campaign/tabletop_vacuum_chamber_sealer_1779936554111.png",
               "https://jkfyyidrrjenvwdxljze.supabase.co/storage/v1/object/public/articles/seo-campaign/tabletop_band_sealer_1779936579544.png",
               "https://jkfyyidrrjenvwdxljze.supabase.co/storage/v1/object/public/articles/seo-campaign/tabletop_sealer_control_panel_1779936603350.png",
               "gemini_img_cover_tabletop_vacuum",
               "gemini_img_inline_band_sealer",
               "gemini_img_inline_control_panel"
             ];
             
             updatedContent = replaceAllSafe(updatedContent, knownOlds[0], newUrls[0]);
             updatedContent = replaceAllSafe(updatedContent, knownOlds[3], newUrls[0]);
             
             updatedContent = replaceAllSafe(updatedContent, knownOlds[1], newUrls[1]);
             updatedContent = replaceAllSafe(updatedContent, knownOlds[4], newUrls[1]);
             
             updatedContent = replaceAllSafe(updatedContent, knownOlds[2], newUrls[2]);
             updatedContent = replaceAllSafe(updatedContent, knownOlds[5], newUrls[2]);
             
             targetArticle.images = [
               { url: newUrls[0], type: 'cover', alt: 'เครื่องซีลตั้งโต๊ะแบบสูญญากาศ' },
               { url: newUrls[1], type: 'inline1', alt: 'เครื่องซีลสายพานตั้งโต๊ะ' },
               { url: newUrls[2], type: 'inline2', alt: 'แผงควบคุมดิจิทัล' }
             ];
          }
          
          targetArticle.content = updatedContent;
          localStorage.setItem('campaign_config_generatedArticles', JSON.stringify(articles));
          
          log('<span style="color:green; font-weight:bold; font-size: 1.2em;">✅ อัปเดตบทความ เครื่องซีลตั้งโต๊ะ ขนาดเล็ก สำเร็จชัวร์ 100%!</span><br>กลับไป Refresh ที่หน้าแอป SEOGEN ได้เลยครับ');
        } else {
          log('<span style="color:red">❌ ไม่พบบทความ เครื่องซีลตั้งโต๊ะ ในระบบ</span>');
        }
      } else {
        log('<span style="color:red">❌ ไม่พบข้อมูลบทความเลยใน LocalStorage</span>');
      }
    } catch (e) {
      log('<span style="color:red">❌ Error: ' + e.message + '</span>');
    }
  </script>
</body>
</html>
