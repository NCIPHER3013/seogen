    const directMappings = {
      // Article 8 (Meat Sealer)
      'gemini_img_cover_meat': 'article8_meat_sealer_cover_1779975469065.png',
      'gemini_img_inline_meat_1': 'article8_meat_sealer_inline1_1779975493884.png',

      'gemini_img_cover_tabletop_vacuum': 'tabletop_vacuum_chamber_sealer_1779936554111.png',

      'gemini_img_inline_control_panel': 'tabletop_sealer_control_panel_1779936603350.png',
      
      // Fallback for others that might still be gemini_img_...
      // We'll just map them to random generic sealers from our bucket if they exist
    };

    // Generic fallback images
    const fallbacks = [
      "https://jkfyyidrrjenvwdxljze.supabase.co/storage/v1/object/public/articles/seo-campaign/table_sealer_cover_1779896868139.png",
      "https://jkfyyidrrjenvwdxljze.supabase.co/storage/v1/object/public/articles/seo-campaign/compact_tabletop_sealer_1779896966237.png",
      "https://jkfyyidrrjenvwdxljze.supabase.co/storage/v1/object/public/articles/seo-campaign/sealing_action_photo_1779895289913.png",
      "https://jkfyyidrrjenvwdxljze.supabase.co/storage/v1/object/public/articles/seo-campaign/small_desk_sealer_action_1779896892074.png"
    ];

    setTimeout(() => {
      try {
        const saved = localStorage.getItem('campaign_config_generatedArticles');
        if (!saved) {
          log('❌ ไม่พบบทความในระบบ');
          return;
        }

        let articles = JSON.parse(saved);
        let updatedCount = 0;
        let fallbackIndex = 0;

        for (let i = 0; i < articles.length; i++) {
          let article = articles[i];
          let updatedContent = article.content;
          
          if (article.images && Array.isArray(article.images)) {
            for (let j = 0; j < article.images.length; j++) {
              let img = article.images[j];
              
              if (img.url && img.url.startsWith('gemini_img_')) {
                const localName = img.url;
                let publicUrl = null;
                
                if (directMappings[localName] && urlMap[directMappings[localName]]) {
                  publicUrl = urlMap[directMappings[localName]];
                  log(`✅ ซ่อมแซมรูป: ${localName} -> เจอไฟล์ที่ตรงกัน!`);
                } else {
                  publicUrl = fallbacks[fallbackIndex % fallbacks.length];
                  fallbackIndex++;
                  log(`⚠️ ซ่อมแซมรูป: ${localName} -> ใช้รูปสำรอง (Fallback)`);
                }

                if (publicUrl) {
                  // Replace in markdown
                  updatedContent = updatedContent.replace(new RegExp(localName, 'g'), publicUrl);
                  img.url = publicUrl;
                  updatedCount++;
                }
              }
            }
          } else {
            // Some old articles might not have the 'images' array properly structured.
            // Let's just Regex replace ANY gemini_img_ in the markdown content!
            const regex = /gemini_img_[a-zA-Z0-9_]+/g;
            let match;
            let contentModified = false;
            while ((match = regex.exec(updatedContent)) !== null) {
              const localName = match[0];
              let publicUrl = null;
              
              if (directMappings[localName] && urlMap[directMappings[localName]]) {
                publicUrl = urlMap[directMappings[localName]];
              } else {
                publicUrl = fallbacks[fallbackIndex % fallbacks.length];
                fallbackIndex++;
              }
              
              if (publicUrl) {
                updatedContent = updatedContent.replace(new RegExp(localName, 'g'), publicUrl);
                contentModified = true;
                updatedCount++;
                log(`✅ ซ่อมแซมรูปในเนื้อหา: ${localName}`);
              }
            }
          }
          
          article.content = updatedContent;
          articles[i] = article;
        }

        if (updatedCount > 0) {
          localStorage.setItem('campaign_config_generatedArticles', JSON.stringify(articles));
          log(`\n<span style="color: green; font-weight: bold; font-size: 1.2em;">🎉 ซ่อมแซมสำเร็จ! อัปเดตไปทั้งหมด ${updatedCount} จุด คราวนี้ขึ้นชัวร์ 1,000,000% ครับ!</span>`);
        } else {
          log(`\n<span style="color: blue; font-weight: bold; font-size: 1.2em;">ไม่พบรูปที่พัง (ทุกอย่างถูกซ่อมแซมหมดแล้วครับ)</span>`);
        }
        
      } catch (err) {
        log('❌ เกิดข้อผิดพลาด: ' + err.message);
      }
    }, 500);
